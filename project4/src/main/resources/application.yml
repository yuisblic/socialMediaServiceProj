spring:
  profiles:
    active: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long!}
  access-token-expiry: 1800000
  refresh-token-expiry: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

feed:
  ranking:
    like-score: 2      # 좋아요 점수
    comment-score: 3   # 댓글 점수
    top-size: 10       # 인기 게시글 TOP N
